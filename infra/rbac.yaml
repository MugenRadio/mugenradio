apiVersion: v1
kind: ServiceAccount
metadata:
  name: radio-agent
  namespace: radio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: radio-agent
  namespace: radio
rules:
  - apiGroups: ["", "apps", "batch", "networking.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: radio-agent
  namespace: radio
subjects:
  - kind: ServiceAccount
    name: radio-agent
    namespace: radio
roleRef:
  kind: Role
  name: radio-agent
  apiGroup: rbac.authorization.k8s.io
