# Job de maintenance : synchronise /data/repo depuis l'origin, régénère la
# playlist (format ffconcat auto-référent) et republie le site.
# Usage : kubectl apply -f ce-fichier ; attendre complete ; kubectl delete job sync
apiVersion: batch/v1
kind: Job
metadata:
  name: sync
  namespace: radio
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: radio-data
        - name: origin
          hostPath:
            path: /home/sib/radio.git
            type: Directory
      containers:
        - name: sync
          image: localhost/radio-brain:v1
          imagePullPolicy: Never
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          env:
            - { name: HOME, value: /data/home }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: origin, mountPath: /origin }
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /data/home
              git config --global --add safe.directory '*'
              git -C /data/repo pull
              # Chemins RELATIFS obligatoires : l'instance concat imbriquée
              # (auto-référence) n'hérite pas de -safe 0 et rejette l'absolu.
              cd /data
              { echo "ffconcat version 1.0"
                for f in music/active/*.mp3; do echo "file '$f'"; done
                echo "file 'playlist.txt'"; } > /data/playlist.txt
              cat /data/playlist.txt
              sh /data/repo/agent/bin/publish-www.sh
              echo SYNC_OK
