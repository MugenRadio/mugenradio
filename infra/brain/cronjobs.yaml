apiVersion: batch/v1
kind: CronJob
metadata:
  name: brain-ops
  namespace: radio
spec:
  schedule: "15 */6 * * *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: radio-agent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: radio-data
            - name: origin
              hostPath:
                path: /home/sib/radio.git
                type: Directory
          containers:
            - name: brain
              image: localhost/radio-brain:v1
              imagePullPolicy: Never
              resources:
                requests: { cpu: 500m, memory: 512Mi }
                limits: { cpu: "2", memory: 2Gi }
              env:
                - { name: WAKE_KIND, value: ops }
                - { name: MODEL, value: claude-haiku-4-5 }
                - { name: MAX_TURNS, value: "15" }
                - { name: API_BUDGET_USD, value: "150" }
                - { name: HOME, value: /data/home }
              envFrom:
                - secretRef: { name: radio-keys, optional: true }
              volumeMounts:
                - { name: data, mountPath: /data }
                - { name: origin, mountPath: /origin }
              command:
                - /bin/sh
                - -c
                - |
                  mkdir -p /data/home
                  git config --global --add safe.directory '*'
                  [ -d /data/repo/.git ] || git clone /origin /data/repo
                  exec /bin/sh /data/repo/agent/bin/wake.sh
---
