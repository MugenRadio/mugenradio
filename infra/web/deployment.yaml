apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: radio
spec:
  replicas: 1
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: radio-data
      initContainers:
        # Crée le point de montage hls dans www, sinon runc échoue à monter
        # le subPath hls dans le volume www déjà monté en lecture seule.
        - name: init-mountpoint
          image: nginx:1.27-alpine
          command: ["mkdir", "-p", "/data/www/hls"]
          resources:
            limits: { cpu: 100m, memory: 64Mi }
          volumeMounts:
            - { name: data, mountPath: /data }
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          resources:
            limits: { cpu: 200m, memory: 128Mi }
          volumeMounts:
            - { name: data, mountPath: /usr/share/nginx/html, subPath: www, readOnly: true }
            - { name: data, mountPath: /usr/share/nginx/html/hls, subPath: hls, readOnly: true }
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: radio
spec:
  type: NodePort
  selector: { app: web }
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30092
