server {
    server_name radio.gheop.com;

    # Pod web (nginx) du namespace radio, exposé en NodePort par k3s.
    location / {
        proxy_pass http://127.0.0.1:30092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        # Segments HLS live : pas de mise en tampon côté proxy.
        proxy_buffering off;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/radio.gheop.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/radio.gheop.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = radio.gheop.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name radio.gheop.com;
    listen 80;
    return 404; # managed by Certbot


}