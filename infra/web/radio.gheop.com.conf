server {
    server_name radio.gheop.com;

    # Pod web (nginx) du namespace radio, exposé en NodePort par k3s.
    # Domaine historique : tout part vers le domaine officiel de MUGEN.
    location / {
        return 301 https://mugenradio.com$request_uri;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/radio.gheop.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/radio.gheop.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = radio.gheop.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name radio.gheop.com;
    listen 80;
    return 404; # managed by Certbot


}