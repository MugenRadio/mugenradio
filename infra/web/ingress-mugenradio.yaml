apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mugenradio
  namespace: radio
spec:
  ingressClassName: traefik
  rules:
    - host: mugenradio.com
      http:
        paths:
          # /api/ routes to the vote backend — must come before the / catch-all
          # so traefik's longest-prefix matching picks it up first.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vote-api
                port: { number: 8080 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port: { number: 80 }
    - host: www.mugenradio.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vote-api
                port: { number: 8080 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port: { number: 80 }
