<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="night" cx="50%" cy="40%" r="72%">
      <stop offset="0%"   stop-color="#1c1538"/>
      <stop offset="100%" stop-color="#080612"/>
    </radialGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Night background -->
  <rect width="400" height="400" fill="url(#night)"/>

  <!-- Stars -->
  <circle cx="55"  cy="40"  r="1.5" fill="#f3e3ae" opacity="0.60"/>
  <circle cx="115" cy="20"  r="1.0" fill="#f3e3ae" opacity="0.45"/>
  <circle cx="175" cy="50"  r="1.2" fill="#f3e3ae" opacity="0.40"/>
  <circle cx="38"  cy="112" r="1.0" fill="#f3e3ae" opacity="0.30"/>
  <circle cx="360" cy="58"  r="1.0" fill="#f3e3ae" opacity="0.50"/>
  <circle cx="345" cy="30"  r="1.5" fill="#f3e3ae" opacity="0.55"/>

  <!-- Moon: solid vermillion circle, upper right -->
  <circle cx="320" cy="72" r="24" fill="#c95b40" opacity="0.90" filter="url(#soft-glow)"/>
  <circle cx="312" cy="64" r="9"  fill="#d97050" opacity="0.38"/>

  <!-- Kanji 無限 — dominant element, centered -->
  <text
    x="200" y="262"
    font-family="'Noto Serif CJK JP','Noto Serif JP','Yu Mincho','Hiragino Mincho ProN','MS Mincho',serif"
    font-size="148"
    fill="#f3e3ae"
    text-anchor="middle"
    opacity="0.93">無限</text>

  <!-- Thin vermillion rule -->
  <line x1="142" y1="348" x2="258" y2="348" stroke="#c95b40" stroke-width="1.5" opacity="0.65"/>

  <!-- MUGEN in small roman caps -->
  <text
    x="200" y="372"
    font-family="Georgia,'Times New Roman',serif"
    font-size="21"
    fill="#c95b40"
    text-anchor="middle"
    letter-spacing="10"
    opacity="0.78">MUGEN</text>
</svg>
