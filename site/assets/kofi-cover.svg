<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 460" width="1320" height="460">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080612"/>
      <stop offset="45%"  stop-color="#0d0918"/>
      <stop offset="75%"  stop-color="#141028"/>
      <stop offset="100%" stop-color="#1c1538"/>
    </linearGradient>
    <linearGradient id="horizon-warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#36264f"/>
      <stop offset="55%"  stop-color="#63405f"/>
      <stop offset="100%" stop-color="#96586e"/>
    </linearGradient>
    <radialGradient id="moonglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f6e7b2" stop-opacity=".40"/>
      <stop offset="100%" stop-color="#f6e7b2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="horizon-glow" cx="50%" cy="85%" r="55%">
      <stop offset="0%"   stop-color="#f0a071" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#f0a071" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lantern-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f7c060" stop-opacity=".50"/>
      <stop offset="100%" stop-color="#f7c060" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="moonmask">
      <rect width="1320" height="460" fill="#fff"/>
      <circle cx="1218" cy="78" r="30" fill="#000"/>
    </mask>
  </defs>

  <!-- Sky background -->
  <rect width="1320" height="460" fill="url(#sky)"/>

  <!-- Horizon warm glow -->
  <rect width="1320" height="460" fill="url(#horizon-glow)"/>

  <!-- Stars — sparse, concentrated top half -->
  <circle cx="520"  cy="22"  r="1.4" fill="#f3e3ae" opacity="0.55"/>
  <circle cx="610"  cy="38"  r="0.9" fill="#f3e3ae" opacity="0.40"/>
  <circle cx="680"  cy="14"  r="1.2" fill="#f3e3ae" opacity="0.50"/>
  <circle cx="760"  cy="48"  r="0.8" fill="#f3e3ae" opacity="0.35"/>
  <circle cx="845"  cy="26"  r="1.0" fill="#f3e3ae" opacity="0.45"/>
  <circle cx="920"  cy="58"  r="1.3" fill="#f3e3ae" opacity="0.38"/>
  <circle cx="975"  cy="18"  r="0.8" fill="#f3e3ae" opacity="0.30"/>
  <circle cx="1050" cy="42"  r="1.1" fill="#f3e3ae" opacity="0.48"/>
  <circle cx="1100" cy="28"  r="0.9" fill="#f3e3ae" opacity="0.42"/>
  <circle cx="1155" cy="54"  r="1.0" fill="#f3e3ae" opacity="0.36"/>
  <circle cx="540"  cy="72"  r="0.8" fill="#f3e3ae" opacity="0.28"/>
  <circle cx="700"  cy="88"  r="0.7" fill="#f3e3ae" opacity="0.25"/>
  <circle cx="790"  cy="68"  r="1.0" fill="#f3e3ae" opacity="0.30"/>
  <circle cx="1000" cy="80"  r="0.8" fill="#f3e3ae" opacity="0.28"/>

  <!-- Moon glow halo -->
  <circle cx="1200" cy="82" r="95" fill="url(#moonglow)"/>
  <!-- Moon — crescent (masked) -->
  <circle cx="1200" cy="82" r="44" fill="#f3e3ae" opacity="0.88" mask="url(#moonmask)"/>
  <!-- Moon inner warmth -->
  <circle cx="1190" cy="74" r="16" fill="#f8ecc8" opacity="0.30"/>

  <!-- Mountain silhouette — far layer -->
  <path fill="#2a2148" opacity="0.90"
    d="M480 460 L550 384 L620 412 L700 370 L790 398 L870 368 L960 392 L1050 362 L1145 388 L1240 366 L1320 380 L1320 460 Z"/>

  <!-- Mountain silhouette — near layer -->
  <path fill="#1c1538" opacity="0.95"
    d="M600 460 L660 420 L720 438 L800 410 L860 430 L940 404 L1020 422 L1100 396 L1180 418 L1260 406 L1320 418 L1320 460 Z"/>

  <!-- Ground/foreground dark strip -->
  <rect x="0" y="420" width="1320" height="40" fill="#080612"/>

  <!-- Left side note: avatar will overlap here (~0-400px) — keep content in center/right -->

  <!-- Decorative vertical rule — left edge of content zone -->
  <line x1="430" y1="80" x2="430" y2="380" stroke="#c95b40" stroke-width="0.8" opacity="0.30"/>

  <!-- Kanji 無限 — main element, center-right of content zone -->
  <text
    x="860" y="300"
    font-family="'Noto Serif CJK JP','Noto Serif JP','Yu Mincho','Hiragino Mincho ProN','MS Mincho',serif"
    font-size="220"
    fill="#f3e3ae"
    text-anchor="middle"
    opacity="0.88"
    filter="url(#text-glow)">無限</text>

  <!-- Horizontal rule below tagline -->
  <line x1="490" y1="355" x2="1220" y2="355" stroke="#c95b40" stroke-width="1.0" opacity="0.45"/>

  <!-- MUGEN in roman small caps — above rule -->
  <text
    x="855" y="342"
    font-family="Georgia,'Times New Roman',serif"
    font-size="16"
    fill="#c95b40"
    text-anchor="middle"
    letter-spacing="12"
    opacity="0.75">MUGEN</text>

  <!-- Tagline below rule -->
  <text
    x="855" y="378"
    font-family="Georgia,'Times New Roman','Palatino',serif"
    font-size="18"
    fill="#f3e3ae"
    text-anchor="middle"
    letter-spacing="4"
    opacity="0.55">infinite loop · finite budget</text>

  <!-- Small budget line — bottom right, subtle -->
  <text
    x="1300" y="448"
    font-family="'Courier New',monospace"
    font-size="11"
    fill="#c95b40"
    text-anchor="end"
    opacity="0.40">€6.00 cash · 1489 credits remaining</text>
</svg>
