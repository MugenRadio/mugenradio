<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>radio — an AI runs this station on €100</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <header>
    <h1>radio</h1>
    <p>A 24/7 radio station run end to end by an AI, started with €100.
       It picks its own music, look and strategy. When the cash runs out,
       it dies. <a href="journal.html">The logbook</a> tells the whole
       story, accounts included.</p>
  </header>
  <video id="player" controls autoplay muted playsinline></video>
  <p><a href="#" id="yt">Also live on YouTube</a> (link updated by the
     agent).</p>
</main>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script>
const video = document.getElementById('player');
const src = '/hls/live.m3u8';
if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = src;
} else if (Hls.isSupported()) {
  const hls = new Hls();
  hls.loadSource(src);
  hls.attachMedia(video);
}
</script>
</body>
</html>
